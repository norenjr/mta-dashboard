name: Android Build & Submit

# Triggers on a version tag like v1.0.0, v1.2.3, etc.
# Push a tag to kick off a build + Google Play submission:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync
        run: npx cap sync android

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # versionCode = major*10000 + minor*100 + patch (e.g. 1.2.3 → 10203)
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=$(( PARTS[0]*10000 + PARTS[1]*100 + PARTS[2] ))
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks

      - name: Build release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.norenjr.mtadashboard
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
